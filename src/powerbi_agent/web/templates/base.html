<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}powerbi-agent{% endblock %} — Configuration Tool</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 900:'#1e3a8a' },
            fabric: { 500:'#7c3aed', 600:'#6d28d9' },
          }
        }
      }
    }
  </script>
  <!-- HTMX for dynamic interactions without heavy JS framework -->
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <style>
    .nav-link       { @apply flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-700 hover:text-white transition-colors; }
    .nav-link.active{ @apply bg-brand-600 text-white; }
    .card           { @apply bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700; }
    .badge-bronze   { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-orange-100 text-orange-800; }
    .badge-silver   { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-700; }
    .badge-gold     { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-yellow-100 text-yellow-800; }
    .badge-enabled  { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800; }
    .badge-disabled { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-500; }
    .tag-db         { @apply bg-blue-100   text-blue-800; }
    .tag-api        { @apply bg-purple-100 text-purple-800; }
    .tag-csv        { @apply bg-green-100  text-green-800; }
    .tag-scrape     { @apply bg-amber-100  text-amber-800; }
    .btn-primary    { @apply inline-flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium rounded-lg transition-colors; }
    .btn-secondary  { @apply inline-flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-lg transition-colors; }
    .btn-danger     { @apply inline-flex items-center gap-2 px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-700 text-xs font-medium rounded-lg transition-colors; }
    .form-input     { @apply block w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent; }
    .form-select    { @apply block w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500; }
    .form-label     { @apply block text-sm font-medium text-slate-700 mb-1; }
  </style>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100">

<!-- Layout -->
<div class="flex h-screen overflow-hidden">

  <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
  <aside class="w-64 flex-shrink-0 bg-slate-900 flex flex-col">
    <!-- Logo -->
    <div class="flex items-center gap-2 px-4 py-5 border-b border-slate-700">
      <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <div>
        <p class="text-white font-semibold text-sm leading-none">powerbi-agent</p>
        <p class="text-slate-400 text-xs mt-0.5">Config Tool</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/" class="nav-link {% if page == 'dashboard' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>

      <p class="px-3 py-1 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-4">Ingest</p>
      <a href="/sources/?project={{ request.query_params.get('project', 'default') }}"
         class="nav-link {% if page == 'sources' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
        </svg>
        Data Sources
      </a>

      <p class="px-3 py-1 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-4">Transform</p>
      <a href="/rules/?project={{ request.query_params.get('project', 'default') }}"
         class="nav-link {% if page == 'rules' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
        </svg>
        Rule Engine
      </a>
      <a href="/model/?project={{ request.query_params.get('project', 'default') }}"
         class="nav-link {% if page == 'model' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
        </svg>
        Data Model
      </a>

      <p class="px-3 py-1 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-4">Deliver</p>
      <a href="/pipeline/?project={{ request.query_params.get('project', 'default') }}"
         class="nav-link {% if page == 'pipeline' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        Fabric & Power BI
      </a>
    </nav>

    <!-- Footer -->
    <div class="px-4 py-4 border-t border-slate-700">
      <p class="text-xs text-slate-500">Built by <span class="text-slate-300 font-medium">Santosh Kanthety</span></p>
      <p class="text-xs text-slate-600 mt-0.5">powerbi-agent v0.1.0</p>
    </div>
  </aside>

  <!-- ── Main content ──────────────────────────────────────────────────── -->
  <main class="flex-1 overflow-y-auto">
    <!-- Top bar -->
    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
      <h1 class="text-lg font-semibold">{% block heading %}Dashboard{% endblock %}</h1>
      <div class="flex items-center gap-3">
        <span class="text-sm text-slate-500">Project:</span>
        <select onchange="window.location.search='?project='+this.value"
                class="text-sm border border-slate-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-brand-500">
          {% for p in projects %}
            <option value="{{ p }}" {% if p == (request.query_params.get('project','default')) %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>
    </header>

    <div class="p-6">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<!-- Toast notification slot -->
<div id="toast" class="fixed bottom-4 right-4 hidden z-50">
  <div class="bg-slate-900 text-white px-4 py-2 rounded-lg shadow-lg text-sm"></div>
</div>

<script>
  // Dark mode toggle
  if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');
</script>
</body>
</html>
