name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Force UTF-8 on Windows so Rich output doesn't crash in cp1252 consoles
      - name: Set PYTHONUTF8 (Windows)
        if: runner.os == 'Windows'
        run: echo "PYTHONUTF8=1" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/

      - name: Run tests
        run: pytest tests/ -v --tb=short -p no:anyio

  build:
    name: Build and verify package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify skills are bundled in wheel
        run: |
          python -c "
          import zipfile, sys
          from pathlib import Path
          wheels = list(Path('dist').glob('*.whl'))
          assert wheels, 'No wheel found'
          with zipfile.ZipFile(wheels[0]) as zf:
              skill_files = [f for f in zf.namelist() if 'skills/data/' in f and f.endswith('.md')]
              if not skill_files:
                  print('ERROR: No skill .md files bundled in wheel!', file=sys.stderr)
                  sys.exit(1)
              print(f'OK: {len(skill_files)} skill files bundled in wheel')
          "

      - name: Verify pip install from wheel works
        run: |
          pip install dist/*.whl
          pbi-agent --help
          pbi-agent skills list

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
