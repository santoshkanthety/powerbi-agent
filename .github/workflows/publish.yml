name: Publish to PyPI

# Triggered by pushing a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify skills are bundled in wheel
        run: |
          python -c "
          import zipfile, sys
          wheels = list(__import__('pathlib').Path('dist').glob('*.whl'))
          assert wheels, 'No wheel found'
          with zipfile.ZipFile(wheels[0]) as zf:
              skill_files = [f for f in zf.namelist() if 'skills/data/' in f and f.endswith('.md')]
              if not skill_files:
                  print('ERROR: No skill .md files bundled in wheel!', file=sys.stderr)
                  sys.exit(1)
              print(f'OK: {len(skill_files)} skill files bundled')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/powerbi-agent
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure at: https://pypi.org/manage/project/powerbi-agent/settings/publishing/

  publish-github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b') }}
